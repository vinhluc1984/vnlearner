<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF4500">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vnLearner - Kitty & Friends</title>
    <style>
        :root {
            --primary: #FF4500;
            --secondary: #FFD700;
            --accent: #008000;
            --text: #333;
            --bg: #FFF9E6;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            font-family: 'Comic Sans MS', sans-serif;
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .container {
            background: white; padding: 1.5rem; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 4px solid var(--secondary);
            text-align: center; max-width: 500px; width: 95%;
            position: relative; height: 90vh;
            display: flex; flex-direction: column;
        }

        .screen { display: none; flex-grow: 1; overflow-y: auto; padding: 5px; }
        .active { display: block; }

        .btn { padding: 0.8rem 1.5rem; font-size: 1.1rem; border: none; border-radius: 50px; cursor: pointer; transition: transform 0.2s; font-weight: bold; margin: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-home { background: #4a90e2; color: white; width: 80%; }
        .btn-back { background: none; border: 2px solid var(--primary); color: var(--primary); width: 40px; height: 40px; border-radius: 50%; position: absolute; top: 10px; left: 10px; z-index: 100; }

        .top-bar { position: absolute; top: 15px; right: 15px; font-weight: bold; color: var(--primary); z-index: 10; }

        /* --- CHARACTER LAYERING --- */
        .char-preview-container {
            width: 200px; height: 280px;
            margin: 10px auto;
            position: relative;
        }
        .char-part { position: absolute; left: 50%; transform: translateX(-50%); line-height: 1; pointer-events: none; }
        .char-head { top: 40px; font-size: 7rem; z-index: 5; }
        .char-face { top: 75px; font-size: 2.5rem; z-index: 12; }
        .char-hat { top: 15px; font-size: 4.5rem; z-index: 15; }
        .char-acc { top: 40px; margin-left: 40px; font-size: 3rem; z-index: 10; }   
        .char-body { top: 150px; font-size: 5rem; z-index: 3; }
        .char-gear { top: 140px; margin-left: 70px; font-size: 4rem; z-index: 1; }

        /* --- BACKGROUND VIEW --- */
        .home-view {
            width: 100%; height: 350px;
            border-radius: 20px;
            position: relative;
            background: #f0f0f0;
            display: flex; justify-content: center; align-items: center;   
            overflow: hidden;
            border: 3px solid #ddd;
        }
        .place-bg-icon { position: absolute; font-size: 18rem; opacity: 0.15; z-index: 1; }

        /* --- SHOP --- */
        .shop-tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .tab-btn { padding: 8px; border-radius: 10px; border: 1px solid var(--primary); cursor: pointer; background: white; flex: 1; font-size: 0.8rem; }
        .tab-btn.active { background: var(--primary); color: white; }
        .item-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .item-card { border: 2px solid #eee; border-radius: 12px; padding: 8px; cursor: pointer; background: #fff; position: relative; }
        .item-card.equipped { border-color: var(--primary); background: #fff9e6; }
        .item-card.owned::after { content: '✅'; position: absolute; top: 2px; right: 2px; font-size: 0.7rem; }

        .learn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .learn-card { background: #f9f9f9; border: 2px dashed #ccc; border-radius: 15px; padding: 10px; cursor: pointer; }
        .revealed { border-style: solid; border-color: var(--secondary); background: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">💎 <span id="points-val">0</span></div>

    <div id="menu-screen" class="screen active">
        <h1 style="color:var(--primary); margin-top:40px;">vnLearner</h1>
        <div class="char-preview-container">
             <span id="menu-char-head" class="char-part char-head">🐱</span>
        </div>
        <button class="btn btn-primary" onclick="showScreen('map-screen')">PLAY</button>
    </div>

    <div id="map-screen" class="screen">
        <button class="btn btn-back" onclick="showScreen('menu-screen')">⬅</button>
        <div class="char-preview-container">
            <span id="map-char-head" class="char-part char-head">🐱</span>
            <span id="map-char-body" class="char-part char-body">👕</span>
            <span id="map-char-face" class="char-part char-face"></span>
            <span id="map-char-hat" class="char-part char-hat"></span>
            <span id="map-char-acc" class="char-part char-acc"></span>
            <span id="map-char-gear" class="char-part char-gear"></span>
        </div>
        <button class="btn btn-home" onclick="showScreen('home-screen')">🏠 My Home</button>
        <div style="margin-top:10px;">
            <button class="btn btn-primary" onclick="startVocabSession()">📕 Vocab</button>
            <button class="btn btn-primary" style="background:#FFD700; color:#333;" onclick="openShop()">🏪 Shop</button>
        </div>
    </div>

    <div id="home-screen" class="screen">
        <button class="btn btn-back" onclick="showScreen('map-screen')">⬅</button>
        <h2 id="home-title">Vietnam</h2>
        <div class="home-view">
            <div id="home-place-icon" class="place-bg-icon">⛵</div>
            <div class="char-preview-container">
                <span id="home-char-head" class="char-part char-head">🐱</span>
                <span id="home-char-body" class="char-part char-body">👕</span>
                <span id="home-char-face" class="char-part char-face"></span>
                <span id="home-char-hat" class="char-part char-hat"></span>
                <span id="home-char-acc" class="char-part char-acc"></span>
                <span id="home-char-gear" class="char-part char-gear"></span>
            </div>
        </div>
    </div>

    <div id="shop-screen" class="screen">
        <button class="btn btn-back" onclick="showScreen('map-screen')">⬅</button>
        <div class="shop-tabs" style="margin-top:40px;">
            <button id="tab-char" class="tab-btn active" onclick="setShopTab('char')">Outfits</button>
            <button id="tab-acc" class="tab-btn" onclick="setShopTab('acc')">Items</button>
            <button id="tab-place" class="tab-btn" onclick="setShopTab('place')">Places</button>
        </div>
        <div id="shop-items-container" class="item-list"></div>
    </div>

    <div id="learn-screen" class="screen">
        <div id="learn-grid" class="learn-grid"></div>
        <button id="next-quiz-btn" class="btn btn-primary" style="display:none;" onclick="startVocabQuiz()">Quiz!</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="quiz-emoji" style="font-size:5rem; margin:20px;"></div>
        <div id="quiz-options"></div>
    </div>
</div>

<script>
    const vocabData = [
        { word:'Mèo', en:'Cat', emoji:'🐱' }, { word:'Chó', en:'Dog', emoji:'🐶' },
        { word:'Cá', en:'Fish', emoji:'🐟' }, { word:'Táo', en:'Apple', emoji:'🍎' }
    ];

    const places = {
        'vn': {e:'⛵', n:'Hạ Long', en:'Vietnam'},
        'cyber': {e:'🏙️', n:'Neo-Saigon', en:'Future'},
        'zootopia': {e:'🦒', n:'Zootopia', en:'Savanna Central'},
        'paris': {e:'🗼', n:'Paris', en:'France'}
    };

    let points = parseInt(localStorage.getItem('points')) || 0;
    let inventory = JSON.parse(localStorage.getItem('inventory')) || ['vn'];
    let activePlace = localStorage.getItem('activePlace') || 'vn';
    let custom = JSON.parse(localStorage.getItem('custom')) || { body:'👕', bodyColor:'blue', acc:'', hat:'', face:'', gear:'' };

    function save() {
        localStorage.setItem('points', points);
        localStorage.setItem('inventory', JSON.stringify(inventory));
        localStorage.setItem('custom', JSON.stringify(custom));
        localStorage.setItem('activePlace', activePlace);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        updateUI();
    }

    function updateCharacterElements(prefix) {
        const parts = ['head','body','face','hat','acc','gear'];
        parts.forEach(p => {
            const el = document.getElementById(`${prefix}-char-${p}`);
            if(!el) return;
            if(p === 'head') el.innerText = '🐱';
            if(p === 'body') {
                el.innerText = custom.body;
                el.style.color = custom.bodyColor === 'pink' ? '#ff69b4' : (custom.bodyColor === 'black' ? '#333' : '#3498db');
            }
            if(['face','hat','acc','gear'].includes(p)) el.innerText = custom[p] || '';
        });
    }

    function updateUI() {
        document.getElementById('points-val').innerText = points;
        updateCharacterElements('map');
        updateCharacterElements('home');
        const p = places[activePlace] || places['vn'];
        document.getElementById('home-place-icon').innerText = p.e;
        document.getElementById('home-title').innerText = p.n;
    }

    let currentTab = 'char';
    function setShopTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        renderShop();
    }

    function renderShop() {
        const container = document.getElementById('shop-items-container');
        container.innerHTML = '';
        let items = [];

        if(currentTab === 'char') {
            items = [
                { id: 'idol', name: 'K-Pop', emoji: '🕺', type: 'body', color: 'pink', price: 100 },
                { id: 'hunter', name: 'Hunter', emoji: '🥋', type: 'body', color: 'black', price: 150 },
                { id: 'police', name: 'Police', emoji: '👮', type: 'body', color: 'blue', price: 120 },
                { id: 'classic', name: 'Blue', emoji: '👕', type: 'body', color: 'blue', price: 0 }
            ];
        } else if(currentTab === 'acc') {
            items = [
                { id: 'blade', name: 'Blade', emoji: '🗡️', type: 'gear', price: 200 },
                { id: 'mask', name: 'Mask', emoji: '🎭', type: 'face', price: 80 },
                { id: 'bunny', name: 'Judy', emoji: '🐰', type: 'hat', price: 100 },
                { id: 'donut', name: 'Donut', emoji: '🍩', type: 'acc', price: 30 },
                { id: 'glasses', name: 'Cool', emoji: '🕶️', type: 'face', price: 50 }
            ];
        } else {
            items = [
                { id: 'cyber', name: 'Cyber', emoji: '🏙️', type: 'place', price: 200 },
                { id: 'zootopia', name: 'Zootopia', emoji: '🦒', type: 'place', price: 180 },
                { id: 'paris', name: 'Paris', emoji: '🗼', type: 'place', price: 120 }
            ];
        }

        items.forEach(item => {
            const isOwned = inventory.includes(item.id) || item.price === 0;
            const isEquipped = custom[item.type] === item.emoji || activePlace === item.id;
            const card = document.createElement('div');
            card.className = `item-card ${isOwned ? 'owned' : ''} ${isEquipped ? 'equipped' : ''}`;
            card.innerHTML = `<span style="font-size:2rem">${item.emoji}</span><br><small>${isOwned ? 'Equip' : item.price+'💎'}</small>`;
            
            card.onclick = () => {
                if(isOwned) {
                    if(item.type === 'place') activePlace = item.id;
                    else {
                        custom[item.type] = (custom[item.type] === item.emoji) ? '' : item.emoji;
                        if(item.color) custom.bodyColor = item.color;
                    }
                    save(); updateUI(); renderShop();
                } else if(points >= item.price) {
                    points -= item.price; inventory.push(item.id);
                    save(); updateUI(); renderShop();
                }
            };
            container.appendChild(card);
        });
    }

    function openShop() { showScreen('shop-screen'); renderShop(); }

    let session = [];
    function startVocabSession() {
        showScreen('learn-screen');
        session = vocabData.sort(() => 0.5 - Math.random());
        const grid = document.getElementById('learn-grid'); grid.innerHTML = '';
        let count = 0;
        session.forEach(item => {
            const card = document.createElement('div'); card.className = 'learn-card';
            card.innerHTML = `<span style="font-size:2rem">${item.emoji}</span><p>${item.word}</p>`;
            card.onclick = () => {
                if(!card.classList.contains('revealed')) { card.classList.add('revealed'); count++; }
                if(count === session.length) document.getElementById('next-quiz-btn').style.display = 'block';
            };
            grid.appendChild(card);
        });
    }

    function startVocabQuiz() {
        showScreen('quiz-screen');
        const target = session[0];
        document.getElementById('quiz-emoji').innerText = target.emoji;
        const options = document.getElementById('quiz-options'); options.innerHTML = '';
        session.forEach(o => {
            const btn = document.createElement('button'); btn.className = 'btn btn-primary';
            btn.innerText = o.word;
            btn.onclick = () => {
                if(o === target) { points += 50; save(); showScreen('map-screen'); }
            };
            options.appendChild(btn);
        });
    }

    updateUI();
</script>
</body>
</html>
